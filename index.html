<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO-CYBER RPG</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #05050a;
            --cyber-panel: rgba(10, 20, 40, 0.9);
            --neon-green: #39ff14;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
        }

        /* 走査線エフェクト */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0a1020 0%, #05050a 100%);
        }

        /* 探索画面 */
        #exploration-view {
            position: relative;
            width: 320px;
            height: 320px;
            background: #000;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
        }

        .tile {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.3s;
        }

        .wall { 
            background: linear-gradient(45deg, #1a1a1a, #333);
            border: 1px solid #444; 
        }
        .floor { 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .player { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); z-index: 10; }
        .enemy { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }

        /* バトル画面 */
        #battle-view {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            z-index: 50;
        }

        .battle-stage {
            width: 100%;
            max-width: 500px;
            height: 250px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            border-bottom: 2px solid var(--neon-blue);
            position: relative;
        }

        .battle-entity {
            text-align: center;
            transition: transform 0.2s;
        }

        .entity-sprite {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .hp-bar-container {
            width: 120px;
            height: 8px;
            background: #222;
            border: 1px solid #444;
            margin: 5px auto;
            border-radius: 4px;
            overflow: hidden;
        }

        .hp-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #00f2ff);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .enemy-hp { background: linear-gradient(90deg, #8e2de2, #bc13fe); }

        /* UI操作パネル */
        #controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 12px;
        }

        .btn {
            background: var(--cyber-panel);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(0, 242, 255, 0.2);
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.9);
            background: var(--neon-blue);
            color: black;
        }

        #battle-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .battle-btn {
            padding: 18px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* メッセージボックス */
        #message-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(10, 15, 30, 0.95);
            border-left: 5px solid var(--neon-blue);
            border-right: 1px solid var(--neon-blue);
            border-top: 1px solid var(--neon-blue);
            border-bottom: 1px solid var(--neon-blue);
            padding: 15px;
            min-height: 90px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 110;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #message-box::before {
            content: "LOG_STREAM >>";
            display: block;
            font-size: 10px;
            color: var(--neon-blue);
            margin-bottom: 5px;
            opacity: 0.7;
        }

        /* アニメーション */
        @keyframes damage {
            0% { transform: translateX(0); filter: brightness(2); }
            20% { transform: translateX(-15px); }
            40% { transform: translateX(15px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            100% { transform: translateX(0); filter: brightness(1); }
        }

        .shake { animation: damage 0.4s; }

        .hidden { display: none !important; }

        #intro-overlay {
            position: absolute;
            inset: 0;
            background: black;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            transition: opacity 1s;
        }

        .glitch-text {
            color: var(--neon-blue);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px var(--neon-purple);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- イントロ -->
    <div id="intro-overlay" onclick="closeIntro()">
        <div class="glitch-text">NEO-CYBER_GHOST v1.0.4</div>
        <p style="font-size: 14px; color: #888;">西暦2099年。人類の意識はグリッドにアップロードされた。<br>しかし、正体不明のウイルスが全記憶を消去しようとしている。<br><br>あなたは最後の防衛プログラム「PROTAGONIST.SYS」。<br>深層ネットワークを探索し、脅威を排除せよ。</p>
        <div class="btn" style="margin-top: 30px; width: 200px;">システム起動</div>
    </div>

    <!-- 探索レイヤー -->
    <div id="ui-layer" style="margin-bottom: 10px; width: 320px; display: flex; justify-content: space-between; font-size: 12px; color: var(--neon-blue);">
        <span id="player-stats">HP: 100/100 | NODE: 01</span>
        <span id="player-lvl">VER: 1.0</span>
    </div>

    <div id="exploration-view">
        <!-- JSで生成 -->
    </div>

    <div id="controls">
        <div></div><div class="btn" onclick="move(0, -1)">▲</div><div></div>
        <div class="btn" onclick="move(-1, 0)">◀</div><div class="btn" onclick="move(0, 1)">▼</div><div class="btn" onclick="move(1, 0)">▶</div>
    </div>

    <!-- バトルレイヤー -->
    <div id="battle-view">
        <div style="text-align: center;">
            <div style="font-size: 10px; color: var(--neon-purple);">THREAT DETECTED</div>
            <h2 id="battle-title" style="margin: 5px; color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); font-size: 1.2rem;">ウイルス干渉</h2>
        </div>
        
        <div class="battle-stage">
            <div id="player-battler" class="battle-entity">
                <div class="hp-bar-container"><div id="p-hp-bar" class="hp-bar-fill"></div></div>
                <div class="entity-sprite">🤖</div>
                <div style="font-size: 12px; opacity: 0.8;">防衛:UNIT_01</div>
            </div>
            <div id="enemy-battler" class="battle-entity">
                <div class="hp-bar-container"><div id="e-hp-bar" class="hp-bar-fill enemy-hp"></div></div>
                <div class="entity-sprite">👾</div>
                <div id="enemy-name" style="font-size: 12px; opacity: 0.8; color: var(--neon-purple);">VIRUS.EXE</div>
            </div>
        </div>

        <div id="battle-menu">
            <div class="btn battle-btn" onclick="battleAction('attack')">コード・ブレイク</div>
            <div class="btn battle-btn" onclick="battleAction('heal')">整合性修復</div>
            <div class="btn battle-btn" onclick="battleAction('scan')">深層スキャン</div>
            <div class="btn battle-btn" onclick="battleAction('run')">緊急エスケープ</div>
        </div>
    </div>

    <div id="message-box">初期化完了。グリッドの探索準備が整いました。</div>
</div>

<script>
    // ゲーム状態の管理
    const state = {
        view: 'explore',
        player: {
            x: 1, y: 1,
            hp: 100, maxHp: 100,
            level: 1,
            atk: 15,
            nodesExplored: 1
        },
        enemy: null,
        map: [],
        mapWidth: 10,
        mapHeight: 10
    };

    const enemyData = [
        { name: 'スパイウェア', sprite: '🕷️', msg: '情報の窃取を試みています。' },
        { name: 'トロイの木馬', sprite: '🐴', msg: 'バックドアを構築しようとしています。' },
        { name: 'ランサムウェア', sprite: '🔒', msg: 'システムファイルを暗号化しようとしています。' },
        { name: 'ルートキット', sprite: '👻', msg: 'カーネルレベルでの侵食を確認。' },
        { name: 'ワーム', sprite: '🐛', msg: '自己複製を開始しています。' }
    ];

    function closeIntro() {
        document.getElementById('intro-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro-overlay').style.display = 'none';
        }, 1000);
    }

    // マップの初期化
    function initMap() {
        const grid = document.getElementById('exploration-view');
        grid.innerHTML = '';
        state.map = [];

        for (let y = 0; y < state.mapHeight; y++) {
            state.map[y] = [];
            for (let x = 0; x < state.mapWidth; x++) {
                let type = 'floor';
                if (x === 0 || x === 9 || y === 0 || y === 9) type = 'wall';
                else if (Math.random() < 0.15 && (x !== 1 || y !== 1)) type = 'wall';
                else if (Math.random() < 0.08 && (x !== 1 || y !== 1)) type = 'enemy';

                state.map[y][x] = type;
                
                const tile = document.createElement('div');
                tile.id = `tile-${x}-${y}`;
                tile.className = `tile ${type}`;
                if (type === 'enemy') tile.innerHTML = '👾';
                grid.appendChild(tile);
            }
        }
        updatePlayerPos();
    }

    function updatePlayerPos() {
        document.querySelectorAll('.player').forEach(el => {
            el.classList.remove('player');
            const coords = el.id.split('-');
            const tx = parseInt(coords[1]);
            const ty = parseInt(coords[2]);
            el.innerHTML = state.map[ty][tx] === 'enemy' ? '👾' : '';
        });

        const pTile = document.getElementById(`tile-${state.player.x}-${state.player.y}`);
        pTile.classList.add('player');
        pTile.innerHTML = '🤖';
    }

    function showMessage(text) {
        const box = document.getElementById('message-box');
        box.innerText = text;
    }

    function move(dx, dy) {
        if (state.view !== 'explore') return;

        const newX = state.player.x + dx;
        const newY = state.player.y + dy;

        if (newX >= 0 && newX < 10 && newY >= 0 && newY < 10) {
            const targetTile = state.map[newY][newX];
            if (targetTile !== 'wall') {
                state.player.x = newX;
                state.player.y = newY;
                updatePlayerPos();

                if (targetTile === 'enemy') {
                    startBattle();
                } else {
                    if (Math.random() < 0.05) showMessage("ノイズを検知。近くに敵対プログラムが存在します。");
                }
            }
        }
    }

    function startBattle() {
        state.view = 'battle';
        const info = enemyData[Math.floor(Math.random() * enemyData.length)];
        
        state.enemy = {
            name: info.name,
            sprite: info.sprite,
            hp: 50 + (state.player.level * 15),
            maxHp: 50 + (state.player.level * 15),
            atk: 10 + (state.player.level * 3)
        };

        document.getElementById('enemy-name').innerText = state.enemy.name;
        document.querySelector('#enemy-battler .entity-sprite').innerText = state.enemy.sprite;
        updateBattleUI();
        
        document.getElementById('exploration-view').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('battle-view').style.display = 'flex';
        
        showMessage(`警告：【${state.enemy.name}】が接触。${info.msg}`);
    }

    function updateBattleUI() {
        const pPercent = (state.player.hp / state.player.maxHp) * 100;
        const ePercent = (state.enemy.hp / state.enemy.maxHp) * 100;
        
        document.getElementById('p-hp-bar').style.width = `${pPercent}%`;
        document.getElementById('e-hp-bar').style.width = `${ePercent}%`;
        document.getElementById('player-stats').innerText = `HP: ${state.player.hp}/${state.player.maxHp} | NODE: ${String(state.player.nodesExplored).padStart(2, '0')}`;
        document.getElementById('player-lvl').innerText = `VER: ${state.player.level}.0`;
    }

    async function battleAction(action) {
        if (state.view !== 'battle') return;

        const eBattler = document.getElementById('enemy-battler');
        const pBattler = document.getElementById('player-battler');

        if (action === 'attack') {
            const damage = state.player.atk + Math.floor(Math.random() * 8);
            state.enemy.hp -= damage;
            eBattler.classList.add('shake');
            showMessage(`コード・ブレイク実行。${state.enemy.name}の構造を ${damage}bit 破壊。`);
            setTimeout(() => eBattler.classList.remove('shake'), 300);
        } else if (action === 'heal') {
            const heal = 25 + (state.player.level * 5);
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
            showMessage(`システム整合性をチェック中... 損害を ${heal} ポイント修復。`);
        } else if (action === 'run') {
            showMessage("緊急パケットで脱出を試行...");
            if (Math.random() > 0.4) {
                endBattle(false);
                showMessage("一時退避に成功。セッションを維持しています。");
                return;
            } else {
                showMessage("トラフィック過多！エスケープに失敗しました。");
            }
        } else if (action === 'scan') {
            showMessage(`深層スキャン：${state.enemy.name} [脆弱性:物理コード / 攻撃性: ${state.enemy.atk}]`);
        }

        updateBattleUI();

        if (state.enemy.hp <= 0) {
            showMessage(`${state.enemy.name} の全プロセスを強制終了。経験値を吸い出しました。`);
            state.player.level++;
            state.player.maxHp += 15;
            state.player.hp = state.player.maxHp;
            state.player.atk += 6;
            state.player.nodesExplored++;
            setTimeout(() => {
                showMessage(`バージョンアップ：Ver.${state.player.level}.0 へ更新。処理能力が向上。`);
                setTimeout(() => endBattle(true), 1500);
            }, 1000);
            return;
        }

        // 敵のターン
        await new Promise(r => setTimeout(r, 1000));
        const eDamage = state.enemy.atk + Math.floor(Math.random() * 4);
        state.player.hp -= eDamage;
        pBattler.classList.add('shake');
        showMessage(`${state.enemy.name} からの不正アクセス！ ${eDamage} ポイントの損傷。`);
        updateBattleUI();
        setTimeout(() => pBattler.classList.remove('shake'), 300);

        if (state.player.hp <= 0) {
            showMessage("CRITICAL_ERROR: カーネルパニック。全メモリが消失しました...");
            setTimeout(() => location.reload(), 2500);
        }
    }

    function endBattle(victory) {
        if (victory) {
            state.map[state.player.y][state.player.x] = 'floor';
            const tile = document.getElementById(`tile-${state.player.x}-${state.player.y}`);
            tile.innerHTML = '';
        }
        
        state.view = 'explore';
        document.getElementById('exploration-view').style.display = 'grid';
        document.getElementById('controls').style.display = 'grid';
        document.getElementById('battle-view').style.display = 'none';
        updatePlayerPos();
        updateBattleUI();
    }

    window.addEventListener('keydown', (e) => {
        if (state.view === 'explore') {
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
        }
    });

    window.onload = initMap;
</script>
</body>
</html>
